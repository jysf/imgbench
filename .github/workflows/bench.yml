  # timing-gate:
  #   runs-on: [self-hosted, bench-rig]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: python3 -m bench run --inputs corpus/images
  #     - run: python3 -m bench compare runs/baseline runs/latest --gate-speed
